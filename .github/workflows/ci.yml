name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI is fully offline. The warehouse is Snowflake (cloud, credentialed), so it is NOT spun up
# in CI — instead the agent runs in deterministic MOCK mode: the whole graph (generate, guard,
# bounded repair, refusal) and the eval scoring are exercised against fakes, no DB and no LLM
# key. dbt/Snowflake builds and execution-accuracy against the live warehouse are run locally.
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --group dev
      - name: ruff (lint)
        run: uv run ruff check src tests
      - name: ruff (format check)
        run: uv run ruff format --check src tests
      - name: mypy (strict)
        run: uv run mypy
      - name: semantic-layer drift gate
        # Regenerate the semantic layer from the committed dbt catalog snapshot +
        # _semantic_models.yml and fail if it differs from the committed YAML. Runs offline
        # (no warehouse): the agent's grounding can never silently drift from the dbt models.
        run: uv run python scripts/generate_semantic_layer.py --check
      - name: pytest (unit, mock, no warehouse)
        run: uv run pytest -m "not integration"
      # NOTE: the gold-set eval (`python -m agentic_text_to_sql.eval --smoke`) is NOT run here.
      # It executes reference_sql + the agent's SQL against Snowflake via the read-only client,
      # so it needs live warehouse credentials. Run it locally (`make eval-smoke`).
