# Semantic layer for the UCI Online Retail II star schema (UK/EU e-commerce
# invoices, 2009-2011). All monetary measures are in GBP. Derived from
# raw_schema.json (column existence/types) plus dbt tests and model SQL
# (keys, grain, business meaning).
tables:
  - name: fct_sales
    grain: "one row per invoice line (one product on one invoice)"
    description: "Sales fact table of e-commerce invoice lines, cleaned of cancellations and returns. Measures are in GBP. Aggregate revenue and quantity here, sliced by customer, product, country, or date."
    primary_key: [sales_key]
    foreign_keys:
      - { column: customer_key, references: dim_customer.customer_key }
      - { column: product_key, references: dim_product.product_key }
      - { column: country_key, references: dim_country.country_key }
      - { column: date_key, references: dim_date.date_key }
    columns:
      - { name: sales_key, type: bigint, description: "Surrogate key for the invoice line (one row).", is_pk: true }
      - { name: invoice_no, type: text, description: "Invoice number the line belongs to; degenerate dimension for counting distinct orders.", is_dimension: true }
      - { name: date_key, type: integer, description: "FK to dim_date (YYYYMMDD); the invoice date.", is_fk: true }
      - { name: customer_key, type: text, description: "FK to dim_customer; the purchasing customer.", is_fk: true }
      - { name: product_key, type: text, description: "FK to dim_product; the product sold.", is_fk: true }
      - { name: country_key, type: text, description: "FK to dim_country; the customer's country on the invoice.", is_fk: true }
      - { name: quantity, type: integer, description: "Units sold on the line (always positive; additive).", is_measure: true }
      - { name: unit_price_gbp, type: numeric, description: "Price per unit in GBP (non-additive; average across rows, do not sum).", is_measure: true }
      - { name: revenue_gbp, type: numeric, description: "Line revenue in GBP (quantity * unit price; additive headline measure).", is_measure: true }

  - name: dim_customer
    grain: "one row per customer"
    description: "Customer dimension. One row per customer id; country is the modal (most frequent) country seen across that customer's invoices."
    primary_key: [customer_key]
    foreign_keys: []
    columns:
      - { name: customer_key, type: text, description: "Surrogate key for the customer.", is_pk: true }
      - { name: customer_id, type: integer, description: "Natural customer id from the source data.", is_dimension: true }
      - { name: country, type: text, description: "Customer's modal country across their invoices.", is_dimension: true }

  - name: dim_product
    grain: "one row per stock code (product)"
    description: "Product dimension. One row per stock code; product name is the modal (most frequent) description, chosen to clean typos and placeholder values in the raw data."
    primary_key: [product_key]
    foreign_keys: []
    columns:
      - { name: product_key, type: text, description: "Surrogate key for the product.", is_pk: true }
      - { name: stock_code, type: text, description: "Natural stock code identifying the product.", is_dimension: true }
      - { name: product_name, type: text, description: "Modal product description for the stock code.", is_dimension: true }

  - name: dim_country
    grain: "one row per country"
    description: "Country dimension with a region rollup. Each country maps to a region: DACH (Germany, Austria, Switzerland), Europe, or Rest of World. Conformed dimension shared with the customer's country."
    primary_key: [country_key]
    foreign_keys: []
    columns:
      - { name: country_key, type: text, description: "Surrogate key for the country.", is_pk: true }
      - { name: country, type: text, description: "Country name.", is_dimension: true }
      - { name: region, type: text, description: "Region rollup: one of DACH, Europe, Rest of World.", is_dimension: true }

  - name: dim_date
    grain: "one row per calendar day"
    description: "Calendar date dimension spanning 2009-12-01 to 2011-12-31. date_key is a YYYYMMDD integer used as the fact foreign key; provides time-attribute rollups for filtering and grouping."
    primary_key: [date_key]
    foreign_keys: []
    columns:
      - { name: date_key, type: integer, description: "YYYYMMDD integer surrogate key for the day.", is_pk: true }
      - { name: date, type: date, description: "Calendar date.", is_dimension: true }
      - { name: year, type: integer, description: "Calendar year.", is_dimension: true }
      - { name: quarter, type: integer, description: "Calendar quarter (1-4).", is_dimension: true }
      - { name: month, type: integer, description: "Month number (1-12).", is_dimension: true }
      - { name: month_name, type: text, description: "Month name (e.g. January).", is_dimension: true }
      - { name: day_of_month, type: integer, description: "Day of the month (1-31).", is_dimension: true }
      - { name: day_of_week, type: integer, description: "ISO day of week (1=Monday .. 7=Sunday).", is_dimension: true }
      - { name: is_weekend, type: boolean, description: "True if the day is Saturday or Sunday.", is_dimension: true }

joinable_paths:
  - "fct_sales.customer_key = dim_customer.customer_key"
  - "fct_sales.product_key = dim_product.product_key"
  - "fct_sales.country_key = dim_country.country_key"
  - "fct_sales.date_key = dim_date.date_key"
