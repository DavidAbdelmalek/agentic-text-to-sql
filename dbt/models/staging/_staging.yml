version: 2

models:
  - name: stg_online_retail
    description: "Cleaned, typed sales lines (grain: one invoice line). Currency: GBP."
    columns:
      - name: invoice_no
        data_tests: [not_null]
      - name: customer_id
        data_tests: [not_null]
      - name: stock_code
        data_tests: [not_null]
      - name: quantity
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: unit_price_gbp
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: false
