# Committed: reads ONLY env vars, no secrets. dbt builds as the developer role (key-pair auth)
# into the TTSQL marts schema. The agent NEVER uses these creds — it connects with the
# read-only AGENT_RO role.
agentic_text_to_sql:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('GENAI_DBT_SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('GENAI_DBT_SNOWFLAKE_USER_DEVELOPER') }}"
      private_key_path: "{{ env_var('GENAI_DBT_SNOWFLAKE_PRIVATE_KEY_PATH_DEVELOPER') }}"
      role: "{{ env_var('GENAI_DBT_SNOWFLAKE_ROLE_DEVELOPER') }}"
      warehouse: "{{ env_var('GENAI_DBT_SNOWFLAKE_WAREHOUSE_DEVELOPER') }}"
      database: "{{ env_var('GENAI_DBT_SNOWFLAKE_DATABASE_DEVELOPER') }}"
      schema: TTSQL # dbt marts land here; AGENT_RO is granted SELECT on this schema
      threads: 4
